<<!DOCTYPE html>
<html>
<head>
    <title>Sistema de Chamados</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px 40px;
            font-size: 28px;
            font-weight: 700;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .layout {
            display: flex;
            min-height: calc(100vh - 80px);
        }

        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, #1e3a8a 0%, #1e3c72 100%);
            color: white;
            padding: 30px 20px;
            box-shadow: 5px 0 20px rgba(0,0,0,0.1);
        }

        .sidebar h2 {
            font-size: 18px;
            margin-bottom: 25px;
            color: #e0e7ff;
            font-weight: 600;
        }

        .sidebar p {
            padding: 12px 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255,255,255,0.1);
        }

        .sidebar p:hover {
            background: rgba(255,255,255,0.2);
            transform: translateX(5px);
        }

        .main {
            flex: 1;
            padding: 30px;
            background: #f8fafc;
            overflow-y: auto;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border: 1px solid #e2e8f0;
            transition: all 0.3s ease;
        }

        .card:hover {
            box-shadow: 0 15px 40px rgba(0,0,0,0.12);
            transform: translateY(-2px);
        }

        .card h2 {
            color: #1e293b;
            margin-bottom: 20px;
            font-size: 22px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 12px;
            border-radius: 8px;
            border: 2px solid #e2e8f0;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .dash-card {
            padding: 25px;
            border-radius: 15px;
            color: white;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            position: relative;
            overflow: hidden;
        }

        .dash-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.2);
            transition: left 0.5s ease;
        }

        .dash-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }

        .dash-card:hover::before {
            left: 100%;
        }

        .dash-card h3 {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .dash-card h2 {
            font-size: 36px;
            font-weight: 700;
            margin: 0;
        }

        .blue { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .green { 
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
        }

        .red { 
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            color: #333;
        }

        .red h2 {
            color: #333;
        }

        .charts {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .chart-box {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border: 1px solid #e2e8f0;
            transition: all 0.3s ease;
        }

        .chart-box:hover {
            box-shadow: 0 15px 40px rgba(0,0,0,0.12);
            transform: translateY(-2px);
        }

        .chart-box h3 {
            color: #1e293b;
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: 600;
        }

        ul {
            background: white;
            padding: 20px;
            border-radius: 15px;
            list-style: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border: 1px solid #e2e8f0;
        }

        ul h2 {
            color: #1e293b;
            margin-bottom: 20px;
            font-size: 22px;
        }

        li {
            padding: 15px;
            border-bottom: 1px solid #e2e8f0;
            transition: all 0.3s ease;
            color: #475569;
        }

        li:last-child {
            border-bottom: none;
        }

        li:hover {
            background: #f8fafc;
            padding-left: 20px;
        }

        @media (max-width: 768px) {
            .layout {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: auto;
                display: flex;
                gap: 20px;
            }

            .main {
                padding: 20px;
            }

            .charts {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

<header>🧠 Sistema de Chamados</header>

<div class="layout">

    <div class="sidebar">
        <h2>📊 Menu</h2>
        <p>📋 Meus Chamados</p>
        <p>📈 Dashboard</p>
        <p>⚙️ Configurações</p>
    </div>

    <div class="main">

        <div class="card">
            <h2>📝 Abrir Novo Chamado</h2>

            <input id="nome" placeholder="👤 Nome do Cliente">
            <input id="empresa" placeholder="🏢 Nome da Empresa">

            <select id="sistema">
                <option>🔧 RHID</option>
                <option>⚡ WPE</option>
                <option>📊 PTRP</option>
            </select>

            <select id="tipo">
                <option>❌ Erro</option>
                <option>🐢 Lentidão</option>
                <option>❓ Dúvida</option>
            </select>

            <input type="number" id="impacto" placeholder="👥 Quantas pessoas afetadas?">
            <textarea id="descricao" placeholder="💬 Descreva o problema em detalhes..."></textarea>

            <button onclick="criarChamado()">✨ CRIAR CHAMADO</button>
        </div>

        <!-- DASHBOARD CARDS -->
        <div class="cards">
            <div class="dash-card blue">
                <h3>⏱ Tempo Médio</h3>
                <h2 id="tempoMedio">--</h2>
            </div>

            <div class="dash-card green">
                <h3>⭐ Avaliação Média</h3>
                <h2 id="avaliacaoMedia">--</h2>
            </div>

            <div class="dash-card red">
                <h3>⚠️ Chamados Atrasados</h3>
                <h2 id="atrasados">--</h2>
            </div>
        </div>

        <!-- GRÁFICOS -->
        <div class="charts">
            <div class="chart-box">
                <h3>📊 Chamados por Sistema</h3>
                <canvas id="graficoSistema"></canvas>
            </div>

            <div class="chart-box">
                <h3>🎯 Distribuição por Prioridade</h3>
                <canvas id="graficoPrioridade"></canvas>
            </div>
        </div>

        <!-- LISTA DE CHAMADOS -->
        <ul>
            <h2>📋 Histórico de Chamados</h2>
            <div id="listaChamados"></div>
        </ul>

    </div>

</div>

<script>

let chamados = [];

function classificarPrioridade(impacto, tipo) {
    if (impacto > 10) return "Alta";
    if (tipo === "❌ Erro" || tipo === "Erro") return "Média";
    return "Baixa";
}

function criarChamado() {
    let nome = document.getElementById("nome").value;
    let empresa = document.getElementById("empresa").value;
    let sistema = document.getElementById("sistema").value;
    let tipo = document.getElementById("tipo").value;
    let impacto = parseInt(document.getElementById("impacto").value);

    if (!nome || !empresa || !impacto) {
        alert("❌ Preencha todos os campos!");
        return;
    }

    let chamado = {
        nome: nome,
        empresa: empresa,
        sistema: sistema,
        tipo: tipo,
        impacto: impacto,
        prioridade: classificarPrioridade(impacto, tipo),
        tempo: Math.floor(Math.random() * 200),
        avaliacao: Math.floor(Math.random() * 5) + 1
    };

    chamados.push(chamado);
    
    // Limpar formulário
    document.getElementById("nome").value = "";
    document.getElementById("empresa").value = "";
    document.getElementById("impacto").value = "";
    document.getElementById("descricao").value = "";

    atualizar();
}

function atualizar() {
    mostrar();
    dashboard();
    graficos();
}

function mostrar() {
    let lista = document.getElementById("listaChamados");
    lista.innerHTML = "";

    if (chamados.length === 0) {
        lista.innerHTML = '<li style="text-align: center; color: #94a3b8;">Nenhum chamado ainda...</li>';
        return;
    }

    chamados.forEach((c, i) => {
        let prioridadeColor = c.prioridade === "Alta" ? "#ef4444" : c.prioridade === "Média" ? "#f59e0b" : "#10b981";
        lista.innerHTML += `
            <li style="border-left: 4px solid ${prioridadeColor}; display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <strong>${c.nome}</strong> - ${c.empresa}
                    <br>
                    <small style="color: #64748b;">Sistema: ${c.sistema} | Tipo: ${c.tipo} | Impacto: ${c.impacto} pessoas</small>
                </div>
                <div style="text-align: center;">
                    <span style="background: ${prioridadeColor}; color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;">
                        ${c.prioridade}
                    </span>
                </div>
            </li>
        `;
    });
}

function dashboard() {
    if (chamados.length === 0) {
        document.getElementById("tempoMedio").innerText = "-- min";
        document.getElementById("avaliacaoMedia").innerText = "--";
        document.getElementById("atrasados").innerText = "0";
        return;
    }

    let tempo = 0, aval = 0, atras = 0;

    chamados.forEach(c => {
        tempo += c.tempo;
        aval += c.avaliacao;
        if (c.tempo > 120) atras++;
    });

    document.getElementById("tempoMedio").innerText =
        (tempo / chamados.length).toFixed(1) + " min";

    document.getElementById("avaliacaoMedia").innerText =
        (aval / chamados.length).toFixed(2);

    document.getElementById("atrasados").innerText = atras;
}

let c1, c2;

function graficos() {

    let s = { "🔧 RHID": 0, "⚡ WPE": 0, "📊 PTRP": 0 };
    let p = { "Alta": 0, "Média": 0, "Baixa": 0 };

    chamados.forEach(c => {
        let sistema = c.sistema || "🔧 RHID";
        s[sistema] = (s[sistema] || 0) + 1;
        p[c.prioridade]++;
    });

    if (c1) c1.destroy();
    if (c2) c2.destroy();

    c1 = new Chart(document.getElementById("graficoSistema"), {
        type: 'bar',
        data: {
            labels: Object.keys(s),
            datasets: [{
                label: "Quantidade de Chamados",
                data: Object.values(s),
                backgroundColor: [
                    '#667eea',
                    '#764ba2',
                    '#f093fb'
                ],
                borderColor: [
                    '#667eea',
                    '#764ba2',
                    '#f093fb'
                ],
                borderWidth: 2
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: {
                    display: true,
                    labels: {
                        font: { size: 14, weight: 'bold' }
                    }
                }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: { stepSize: 1 }
                }
            }
        }
    });

    c2 = new Chart(document.getElementById("graficoPrioridade"), {
        type: 'doughnut',
        data: {
            labels: ['Alta', 'Média', 'Baixa'],
            datasets: [{
                data: [p["Alta"], p["Média"], p["Baixa"]],
                backgroundColor: [
                    '#ef4444',
                    '#f59e0b',
                    '#10b981'
                ],
                borderColor: [
                    '#dc2626',
                    '#d97706',
                    '#059669'
                ],
                borderWidth: 2
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: {
                    display: true,
                    labels: {
                        font: { size: 14, weight: 'bold' },
                        padding: 20
                    }
                }
            }
        }
    });
}

</script>

</body>
</html>
